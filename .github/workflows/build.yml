name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            rust:
              - 'mux-compiler/**'
              - 'mux-runtime/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - 'scripts/run-checks.sh'
              - 'scripts/dev-cargo.sh'
              - 'scripts/build_syntax_highlighting.py'
              - 'scripts/sync-version.sh'
              - 'editor-support/**'
              - 'mux-syntax-highlighting/**'
              - 'Dockerfile'
              - 'infra/**'
            website:
              - 'mux-website/**'

  rust_checks:
    name: Rust Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_170_PREFIX: /usr/lib/llvm-17
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-17
      LLVM_SYS_170_STRICT_VERSIONING: "1"
      CC: clang-17
      CXX: clang++-17
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
    steps:
      - uses: actions/checkout@v4
      - name: Version consistency check
        run: ./scripts/sync-version.sh && git diff --exit-code
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - name: Install LLVM 17
        run: sudo apt-get update && sudo apt-get install -y llvm-17-dev clang-17 libpolly-17-dev
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Formatting check
        run: cargo fmt -- --check
      - name: Syntax highlighting artifact check
        run: python3 scripts/build_syntax_highlighting.py --check
      - name: Rust checks
        run: ./scripts/run-checks.sh
  integration_checks:
    name: Integration Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version consistency check
        run: ./scripts/sync-version.sh && git diff --exit-code
      - name: Docker info
        run: docker compose version
      - name: Service-backed checks
        run: ./scripts/integration-checks.sh
  sonarqube:
    name: SonarQube
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rust == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  website_checks:
    name: Website Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.website == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mux-website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mux-website/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
