name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust_checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_170_PREFIX: /usr/lib/llvm-17
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-17
      LLVM_SYS_170_STRICT_VERSIONING: "1"
      CC: clang-17
      CXX: clang++-17
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
    steps:
      - uses: actions/checkout@v4
      - name: Version consistency check
        run: ./scripts/sync-version.sh && git diff --exit-code
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - name: Install LLVM 17
        run: sudo apt-get update && sudo apt-get install -y llvm-17-dev clang-17 libpolly-17-dev
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Formatting check
        run: cargo fmt -- --check
      - name: Rust checks
        run: ./scripts/run-checks.sh
  integration_checks:
    name: Integration Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version consistency check
        run: ./scripts/sync-version.sh && git diff --exit-code
      - name: Docker info
        run: docker compose version
      - name: Service-backed checks
        run: ./scripts/integration-checks.sh
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
