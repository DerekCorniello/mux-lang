name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-release-commit:
    name: Verify Release Commit
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.branch_policy.outputs.on_main }}
    env:
      LLVM_SYS_170_PREFIX: /usr/lib/llvm-17
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-17
      LLVM_SYS_170_STRICT_VERSIONING: "1"
      CC: clang-17
      CXX: clang++-17
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether tag commit is on main
        id: branch_policy
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is on main."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main. Build checks and artifacts will run, release publish will be skipped."
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Install LLVM 17
        run: sudo apt-get update && sudo apt-get install -y llvm-17-dev clang-17 lld-17 libpolly-17-dev

      - name: Formatting check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build
        run: cargo build

  build-artifacts:
    name: Build ${{ matrix.target }}
    needs: verify-release-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            archive_ext: tar.gz
            publish: true
          - os: ubuntu-22.04
            target: linux-x86_64-ubuntu22
            archive_ext: tar.gz
            publish: false
          - os: macos-15-intel
            target: macos-x86_64
            archive_ext: tar.gz
            publish: true
          - os: macos-14
            target: macos-aarch64
            archive_ext: tar.gz
            publish: true
          - os: windows-latest
            target: windows-x86_64
            archive_ext: zip
            publish: true

    env:
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
      LLVM_SYS_170_STRICT_VERSIONING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1

      - name: Install Rust Windows MSVC target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install LLVM 17 (Linux latest)
        if: runner.os == 'Linux' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y llvm-17-dev clang-17 lld-17 libpolly-17-dev

      - name: Install LLVM 17 (Linux 22.04)
        if: runner.os == 'Linux' && matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -O llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y llvm-17-dev clang-17 lld-17 libpolly-17-dev

      - name: Configure LLVM 17 (Linux)
        if: runner.os == 'Linux'
        run: |
          LLVM_PREFIX="$(llvm-config-17 --prefix)"
          echo "LLVM_SYS_170_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config-17)" >> "$GITHUB_ENV"
          echo "CC=clang-17" >> "$GITHUB_ENV"
          echo "CXX=clang++-17" >> "$GITHUB_ENV"

      - name: Install LLVM 17 (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm@17

      - name: Configure LLVM 17 (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm@17)"
          echo "LLVM_SYS_170_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=${LLVM_PREFIX}/bin/llvm-config" >> "$GITHUB_ENV"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"

      - name: Setup Miniconda (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 17 with conda (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          conda create -y -n mux-llvm -c conda-forge llvmdev=17 clang=17 zlib zstd libxml2
          $condaBase = & conda info --base
          $envRoot = Join-Path $condaBase "envs\mux-llvm"
          $llvmPrefix = Join-Path $envRoot "Library"
          $llvmBin = Join-Path $llvmPrefix "bin"
          $llvmLib = Join-Path $llvmPrefix "lib"
          $llvmInclude = Join-Path $llvmPrefix "include"
          $llvmConfigPath = Join-Path $llvmBin "llvm-config.exe"
          $clangPath = Join-Path $llvmBin "clang.exe"
          $clangxxPath = Join-Path $llvmBin "clang++.exe"
          $clangClPath = Join-Path $llvmBin "clang-cl.exe"

          if (-not (Test-Path $llvmConfigPath)) {
            throw "llvm-config.exe not found at $llvmConfigPath"
          }

          if (-not (Test-Path $clangPath)) {
            throw "clang.exe not found in $llvmBin"
          }

          if (-not (Test-Path $clangxxPath)) {
            if (Test-Path $clangClPath) {
              $clangxxPath = $clangClPath
            } else {
              $clangxxPath = $clangPath
            }
          }

          $llvmVersion = & $llvmConfigPath --version
          if (-not $llvmVersion.StartsWith("17.")) {
            throw "Expected LLVM 17.x on Windows runner, found $llvmVersion at $llvmConfigPath"
          }

          $zLibPath = Join-Path $llvmLib "z.lib"
          if (-not (Test-Path $zLibPath)) {
            $zCandidates = @(
              (Join-Path $llvmLib "zlib.lib"),
              (Join-Path $llvmLib "zlibstatic.lib"),
              (Join-Path $llvmLib "zdll.lib")
            )
            $zSource = $zCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

            if ($zSource) {
              Copy-Item $zSource $zLibPath
              Write-Host "Created z.lib shim from $zSource"
            } else {
              Write-Host "Available z-related libs in $llvmLib:"
              Get-ChildItem -Path $llvmLib -Filter "z*.lib" -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
              throw "Could not find a zlib import/static library to create z.lib"
            }
          }

          "LLVM_SYS_170_PREFIX=$llvmPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_CONFIG_PATH=$llvmConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Validate LLVM toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:LLVM_CONFIG_PATH) {
            throw "LLVM_CONFIG_PATH is not set"
          }
          if (-not $env:LLVM_SYS_170_PREFIX) {
            throw "LLVM_SYS_170_PREFIX is not set"
          }
          if (-not (Test-Path $env:LLVM_SYS_170_PREFIX)) {
            throw "LLVM_SYS_170_PREFIX path does not exist: $env:LLVM_SYS_170_PREFIX"
          }
          if (-not (Test-Path (Join-Path $env:LLVM_SYS_170_PREFIX "bin\llvm-config.exe"))) {
            throw "Expected llvm-config at LLVM_SYS_170_PREFIX\\bin\\llvm-config.exe"
          }
          $zLibPath = Join-Path $env:LLVM_SYS_170_PREFIX "lib\z.lib"
          if (-not (Test-Path $zLibPath)) {
            throw "Expected z.lib at $zLibPath"
          }
          & $env:LLVM_CONFIG_PATH --version
          & (Join-Path $env:LLVM_SYS_170_PREFIX "bin\llvm-config.exe") --version
          $cl = Get-Command cl -ErrorAction SilentlyContinue
          if (-not $cl) {
            throw "MSVC compiler (cl.exe) not found on PATH"
          }

      - name: Build runtime (Windows MSVC)
        if: runner.os == 'Windows'
        run: cargo build -p mux-runtime --release --target x86_64-pc-windows-msvc

      - name: Build compiler (Windows MSVC)
        if: runner.os == 'Windows'
        run: cargo build -p mux-lang --release --target x86_64-pc-windows-msvc

      - name: Build runtime (Non-Windows)
        if: runner.os != 'Windows'
        run: cargo build -p mux-runtime --release

      - name: Build compiler (Non-Windows)
        if: runner.os != 'Windows'
        run: cargo build -p mux-lang --release

      - name: Package artifact (Unix)
        if: runner.os != 'Windows' && matrix.publish
        run: |
          set -euo pipefail
          mkdir -p dist/mux-${{ matrix.target }}/bin
          mkdir -p dist/mux-${{ matrix.target }}/lib
          cp target/release/mux dist/mux-${{ matrix.target }}/bin/
          for lib in target/release/libmux_runtime.a target/release/libmux_runtime.so target/release/libmux_runtime.dylib; do
            if [ -f "$lib" ]; then
              cp "$lib" dist/mux-${{ matrix.target }}/lib/
            fi
          done
          tar -C dist -czf dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }} mux-${{ matrix.target }}
          shasum -a 256 dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }} > dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

      - name: Package artifact (Windows)
        if: runner.os == 'Windows' && matrix.publish
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/mux-${{ matrix.target }}/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/mux-${{ matrix.target }}/lib" | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/mux.exe" "dist/mux-${{ matrix.target }}/bin/"

          foreach ($lib in @("target/x86_64-pc-windows-msvc/release/mux_runtime.dll", "target/x86_64-pc-windows-msvc/release/mux_runtime.lib")) {
            if (Test-Path $lib) {
              Copy-Item $lib "dist/mux-${{ matrix.target }}/lib/"
              if ($lib.EndsWith('.dll')) {
                Copy-Item $lib "dist/mux-${{ matrix.target }}/bin/"
              }
            }
          }

          $condaBase = & conda info --base
          $envRoot = Join-Path $condaBase "envs\mux-llvm"
          $llvmBin = Join-Path $envRoot "Library\bin"

          foreach ($pattern in @("LLVM*.dll", "libclang*.dll", "clang*.dll")) {
            Get-ChildItem -Path $llvmBin -Filter $pattern -File -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName "dist/mux-${{ matrix.target }}/bin/"
            }
          }

          foreach ($dll in @("libxml2.dll", "zlib.dll", "zstd.dll")) {
            $candidate = Join-Path $llvmBin $dll
            if (Test-Path $candidate) {
              Copy-Item $candidate "dist/mux-${{ matrix.target }}/bin/"
            }
          }

          & "dist/mux-${{ matrix.target }}/bin/mux.exe" --version
          Compress-Archive -Path "dist/mux-${{ matrix.target }}/*" -DestinationPath "dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}").Hash.ToLower()
          "$hash  mux-${{ matrix.target }}.${{ matrix.archive_ext }}" | Out-File -FilePath "dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256" -Encoding ascii

      - name: Upload build artifacts
        if: matrix.publish
        uses: actions/upload-artifact@v4
        with:
          name: mux-${{ matrix.target }}
          path: |
            dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

  publish-release:
    name: Publish Release
    needs:
      - verify-release-commit
      - build-artifacts
    if: ${{ needs.verify-release-commit.outputs.on_main == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.sha256
