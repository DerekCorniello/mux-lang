name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-release-commit:
    name: Verify Release Commit
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.branch_policy.outputs.on_main }}
    env:
      LLVM_SYS_170_PREFIX: /usr/lib/llvm-17
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-17
      LLVM_SYS_170_STRICT_VERSIONING: "1"
      CC: clang-17
      CXX: clang++-17
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether tag commit is on main
        id: branch_policy
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is on main."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main. Build checks and artifacts will run, release publish will be skipped."
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Install LLVM 17
        run: sudo apt-get update && sudo apt-get install -y llvm-17-dev clang-17 lld-17 libpolly-17-dev

      - name: Formatting check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build
        run: cargo build

  build-artifacts:
    name: Build ${{ matrix.target }}
    needs: verify-release-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            archive_ext: tar.gz
            publish: true
          - os: ubuntu-22.04
            target: linux-x86_64-ubuntu22
            archive_ext: tar.gz
            publish: false
          - os: macos-15-intel
            target: macos-x86_64
            archive_ext: tar.gz
            publish: true
          - os: macos-14
            target: macos-aarch64
            archive_ext: tar.gz
            publish: true
          - os: ubuntu-latest
            target: windows-x86_64
            archive_ext: zip
            publish: true
            cross_windows: true

    env:
      MUX_RUNTIME_SRC: ${{ github.workspace }}/mux-runtime
      LLVM_SYS_170_STRICT_VERSIONING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1

      - name: Install Rust Windows GNU target
        if: matrix.cross_windows
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install LLVM 17 (Linux latest)
        if: runner.os == 'Linux' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y llvm-17-dev clang-17 lld-17 libpolly-17-dev

      - name: Install LLVM 17 (Linux 22.04)
        if: runner.os == 'Linux' && matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -O llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y llvm-17-dev clang-17 lld-17 libpolly-17-dev

      - name: Configure LLVM 17 (Linux)
        if: runner.os == 'Linux'
        run: |
          LLVM_PREFIX="$(llvm-config-17 --prefix)"
          echo "LLVM_SYS_170_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$(command -v llvm-config-17)" >> "$GITHUB_ENV"
          echo "CC=clang-17" >> "$GITHUB_ENV"
          echo "CXX=clang++-17" >> "$GITHUB_ENV"

      - name: Install LLVM 17 (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm@17

      - name: Configure LLVM 17 (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm@17)"
          echo "LLVM_SYS_170_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"

      - name: Install LLVM mingw 17 (Cross Windows)
        if: matrix.cross_windows
        shell: bash
        run: |
          set -euo pipefail
          version="20231128"
          archive="llvm-mingw-${version}-ucrt-ubuntu-20.04-x86_64.tar.xz"
          url="https://github.com/mstorsjo/llvm-mingw/releases/download/${version}/${archive}"
          extract_root="$RUNNER_TEMP/llvm-mingw-17"
          mkdir -p "$extract_root"
          curl -fsSL "$url" -o "$RUNNER_TEMP/$archive"
          tar -xJf "$RUNNER_TEMP/$archive" -C "$extract_root"
          toolchain_root="$(ls -d "$extract_root"/* | head -n 1)"
          if [ ! -d "$toolchain_root/bin" ]; then
            echo "Failed to extract llvm-mingw toolchain"
            exit 1
          fi
          echo "LLVM_MINGW_ROOT=$toolchain_root" >> "$GITHUB_ENV"

      - name: Configure LLVM toolchain (Cross Windows)
        if: matrix.cross_windows
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${LLVM_MINGW_ROOT:-}" ]; then
            echo "LLVM_MINGW_ROOT is not set"
            exit 1
          fi

          llvm_bin="$LLVM_MINGW_ROOT/bin"
          if [ ! -d "$llvm_bin" ]; then
            echo "LLVM bin directory not found at $llvm_bin"
            exit 1
          fi

          llvm_config_path=""
          if [ -x "$llvm_bin/llvm-config" ]; then
            llvm_config_path="$llvm_bin/llvm-config"
          elif [ -x "$llvm_bin/llvm-config-17" ]; then
            llvm_config_path="$llvm_bin/llvm-config-17"
          fi

          if [ -z "$llvm_config_path" ]; then
            ls -1 "$llvm_bin"
            echo "llvm-config not found in toolchain bin"
            exit 1
          fi

          gnu_linker="$llvm_bin/x86_64-w64-mingw32-gcc"
          if [ ! -x "$gnu_linker" ]; then
            ls -1 "$llvm_bin"
            echo "GNU linker not found in toolchain bin"
            exit 1
          fi

          llvm_version="$($llvm_config_path --version)"
          case "$llvm_version" in
            17.*) ;;
            *)
              echo "Expected LLVM 17.x, found $llvm_version"
              exit 1
              ;;
          esac

          echo "LLVM_CONFIG_PATH=$llvm_config_path" >> "$GITHUB_ENV"
          echo "LLVM_SYS_170_PREFIX=$LLVM_MINGW_ROOT" >> "$GITHUB_ENV"
          echo "CC=$llvm_bin/clang" >> "$GITHUB_ENV"
          echo "CXX=$llvm_bin/clang++" >> "$GITHUB_ENV"
          echo "AR=$llvm_bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$gnu_linker" >> "$GITHUB_ENV"
          echo "$llvm_bin" >> "$GITHUB_PATH"

      - name: Validate LLVM tools (Cross Windows)
        if: matrix.cross_windows
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${LLVM_CONFIG_PATH:-}" ]
          [ -x "$LLVM_CONFIG_PATH" ]
          [ -x "$CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER" ]
          "$LLVM_CONFIG_PATH" --version
          "$CC" --version

      - name: Build runtime (Windows GNU)
        if: matrix.cross_windows
        shell: bash
        run: cargo build -p mux-runtime --release --target x86_64-pc-windows-gnu

      - name: Build compiler (Windows GNU)
        if: matrix.cross_windows
        shell: bash
        run: cargo build -p mux-lang --release --target x86_64-pc-windows-gnu

      - name: Build runtime (Non-Windows)
        if: ${{ !matrix.cross_windows }}
        run: cargo build -p mux-runtime --release

      - name: Build compiler (Non-Windows)
        if: ${{ !matrix.cross_windows }}
        run: cargo build -p mux-lang --release

      - name: Package artifact (Unix)
        if: runner.os != 'Windows' && matrix.publish && !matrix.cross_windows
        run: |
          set -euo pipefail
          mkdir -p dist/mux-${{ matrix.target }}/bin
          mkdir -p dist/mux-${{ matrix.target }}/lib
          cp target/release/mux dist/mux-${{ matrix.target }}/bin/
          for lib in target/release/libmux_runtime.a target/release/libmux_runtime.so target/release/libmux_runtime.dylib; do
            if [ -f "$lib" ]; then
              cp "$lib" dist/mux-${{ matrix.target }}/lib/
            fi
          done
          tar -C dist -czf dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }} mux-${{ matrix.target }}
          shasum -a 256 dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }} > dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

      - name: Package artifact (Cross Windows)
        if: matrix.cross_windows && matrix.publish
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/mux-${{ matrix.target }}/bin"
          mkdir -p "dist/mux-${{ matrix.target }}/lib"
          cp "target/x86_64-pc-windows-gnu/release/mux.exe" "dist/mux-${{ matrix.target }}/bin/"
          for lib in "target/x86_64-pc-windows-gnu/release/mux_runtime.dll" "target/x86_64-pc-windows-gnu/release/mux_runtime.dll.a" "target/x86_64-pc-windows-gnu/release/mux_runtime.lib"; do
            if [ -f "$lib" ]; then
              cp "$lib" "dist/mux-${{ matrix.target }}/lib/"
            fi
          done

          toolchain_bin="$LLVM_MINGW_ROOT/bin"
          for dll in libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll libunwind.dll; do
            if [ -f "$toolchain_bin/$dll" ]; then
              cp "$toolchain_bin/$dll" "dist/mux-${{ matrix.target }}/bin/"
            fi
          done

          cp "$toolchain_bin"/libLLVM*.dll "dist/mux-${{ matrix.target }}/bin/" 2>/dev/null || true
          cp "$toolchain_bin"/libclang*.dll "dist/mux-${{ matrix.target }}/bin/" 2>/dev/null || true

          cd dist && zip -r "mux-${{ matrix.target }}.${{ matrix.archive_ext }}" "mux-${{ matrix.target }}"
          sha256sum "mux-${{ matrix.target }}.${{ matrix.archive_ext }}" > "mux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256"

      - name: Upload build artifacts
        if: matrix.publish
        uses: actions/upload-artifact@v4
        with:
          name: mux-${{ matrix.target }}
          path: |
            dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/mux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

  publish-release:
    name: Publish Release
    needs:
      - verify-release-commit
      - build-artifacts
    if: ${{ needs.verify-release-commit.outputs.on_main == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.sha256
