sonar.projectKey=muxlang_mux-compiler
sonar.organization=muxlang
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
# Scope analysis to the compiler. The syntax/editor tooling is being extracted to
# its own repos (each gets its own SonarCloud project), and infra/docker/integration
# holds throwaway echo-server fixtures for integration tests. These are analyzed
# where they land, not as part of the compiler gate.
sonar.exclusions=mux-syntax-highlighting/**,editor-support/**,infra/docker/integration/**
