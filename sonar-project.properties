sonar.projectKey=muxlang_mux-compiler
sonar.organization=muxlang
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
# Scope analysis to the compiler. infra/docker/integration holds throwaway
# echo-server fixtures for integration tests, analyzed where they land rather than
# as part of the compiler gate.
sonar.exclusions=infra/docker/integration/**
sonar.rust.lcov.reportPaths=lcov.info
